<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#03030f; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .specimen { font-family:'Space Mono',monospace; }
  .meta { font-family:'Space Mono',monospace; font-size:9px; color:#5a6a7a; letter-spacing:0.1em; white-space:nowrap; }
  .divider { height:1px; background:rgba(0,240,255,0.08); }
</style>
</head>
<body>
  <div class="row">
    <span class="specimen" style="font-size:13px;color:#c8d6e5;line-height:1.9;">デザイン性と機能性を兼ね備えたウェブサイト</span>
    <span class="meta">400 / Body JP</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:13px;color:#c8d6e5;line-height:1.9;">Turning Ideas into Digital Reality</span>
    <span class="meta">400 / Body EN</span>
  </div>
  <div class="divider"></div>
  <div class="row">
    <span class="specimen" style="font-size:10px;letter-spacing:0.2em;color:#5a6a7a;text-transform:uppercase;">VIEW SERVICES</span>
    <span class="meta">400 / Nav / Button</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:10px;letter-spacing:0.1em;color:#00f0ff;text-transform:uppercase;">HTML/CSS · JavaScript</span>
    <span class="meta">400 / Tags</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:10px;letter-spacing:0.3em;color:#00f0ff;text-transform:uppercase;">01 / SERVICES</span>
    <span class="meta">400 / Section Label</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:11px;color:#5a6a7a;letter-spacing:0.08em;font-style:italic;">// Freelance Creator &amp; Developer</span>
    <span class="meta">Italic / Code comment</span>
  </div>
</body>
</html>
