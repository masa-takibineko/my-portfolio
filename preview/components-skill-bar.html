<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#03030f; font-family:'Space Mono',monospace; padding:24px; display:flex; flex-direction:column; gap:14px; }
  .skill { display:flex; align-items:center; gap:14px; }
  .skill-name { font-size:11px; letter-spacing:0.08em; color:#c8d6e5; width:130px; flex-shrink:0; }
  .skill-bar { flex:1; height:3px; background:rgba(255,255,255,0.05); position:relative; overflow:hidden; }
  .skill-fill {
    height:100%; background:linear-gradient(to right,#00f0ff,#ff0099);
    box-shadow:0 0 10px #00f0ff, 0 0 20px rgba(0,240,255,0.4); position:relative;
  }
  .skill-fill::after {
    content:''; position:absolute; right:-1px; top:50%; transform:translateY(-50%);
    width:7px; height:7px; background:#fff; border-radius:50%;
    box-shadow:0 0 8px #00f0ff, 0 0 16px #00f0ff;
  }
  .skill-bar::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    animation:shimmer 2.5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
  .pct { font-size:9px; color:#5a6a7a; width:30px; text-align:right; }
</style>
</head>
<body>
  <div class="skill">
    <span class="skill-name">Web Design</span>
    <div class="skill-bar"><div class="skill-fill" style="width:92%"></div></div>
    <span class="pct">92%</span>
  </div>
  <div class="skill">
    <span class="skill-name">Bot Development</span>
    <div class="skill-bar"><div class="skill-fill" style="width:86%"></div></div>
    <span class="pct">86%</span>
  </div>
  <div class="skill">
    <span class="skill-name">AI / LLM</span>
    <div class="skill-bar"><div class="skill-fill" style="width:89%"></div></div>
    <span class="pct">89%</span>
  </div>
  <div class="skill">
    <span class="skill-name">Frontend Dev</span>
    <div class="skill-bar"><div class="skill-fill" style="width:82%"></div></div>
    <span class="pct">82%</span>
  </div>
</body>
</html>
