<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#03030f; padding:20px; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; align-items:baseline; gap:16px; }
  .specimen { font-family:'Orbitron',monospace; color:#fff; letter-spacing:0.05em; line-height:1; }
  .meta { font-family:'Space Mono',monospace; font-size:9px; color:#5a6a7a; letter-spacing:0.1em; white-space:nowrap; }
  .glow { text-shadow:0 0 20px #00f0ff, 0 0 40px rgba(0,240,255,0.4); color:#00f0ff; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="row">
    <span class="specimen glow" style="font-size:48px;font-weight:900;">takibineko</span>
    <span class="meta">900 / Hero</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:28px;font-weight:700;">SELECTED WORKS</span>
    <span class="meta">700 / Section Title</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:18px;font-weight:700;">Service Title</span>
    <span class="meta">700 / Card Heading</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:14px;font-weight:600;">TBN</span>
    <span class="meta">600 / Logo Mark</span>
  </div>
  <div class="row">
    <span class="specimen" style="font-size:40px;font-weight:900;color:#00f0ff;text-shadow:0 0 30px rgba(0,240,255,0.5);">50+</span>
    <span class="meta">900 / Stat Number</span>
  </div>
</body>
</html>
