<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#03030f; font-family:'Space Mono',monospace; padding:20px; display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; gap:8px; }
  .meta { font-size:9px; color:#5a6a7a; letter-spacing:0.1em; }

  /* Glitch */
  .glitch { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:#fff; position:relative; display:inline-block; letter-spacing:0.05em; }
  .glitch::before,.glitch::after { content:attr(data-text); position:absolute; inset:0; }
  .glitch::before { color:#ff0099; animation:glitch1 3s infinite; clip-path:polygon(0 0,100% 0,100% 45%,0 45%); }
  .glitch::after { color:#00f0ff; animation:glitch2 3s infinite; clip-path:polygon(0 55%,100% 55%,100% 100%,0 100%); }
  @keyframes glitch1 { 0%,80%,100%{transform:translate(0);opacity:0} 82%{transform:translate(-4px,2px);opacity:0.9} 86%{transform:translate(4px,-2px);opacity:0.7} 90%{transform:translate(0);opacity:0} }
  @keyframes glitch2 { 0%,74%,100%{transform:translate(0);opacity:0} 76%{transform:translate(4px,2px);opacity:0.9} 80%{transform:translate(-3px,-2px);opacity:0.6} 82%{transform:translate(0);opacity:0} }

  /* Flicker */
  .flicker { font-family:'Orbitron',monospace; font-size:18px; font-weight:900; color:#00f0ff; letter-spacing:0.2em; text-shadow:0 0 20px #00f0ff; animation:flicker 9s infinite; }
  @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1} 20%,24%,55%{opacity:0.55} }

  /* Reveal */
  .reveal { font-size:13px; color:#c8d6e5; opacity:0; transform:translateY(16px); animation:fadeInUp 0.8s ease forwards 0.3s; }
  @keyframes fadeInUp { to{opacity:1;transform:translateY(0)} }

  /* Scroll line */
  .scroll-line { width:1px; height:36px; background:linear-gradient(to bottom,#00f0ff,transparent); animation:scrollPulse 2s ease-in-out infinite; }
  @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* Shimmer bar */
  .shimmer-bar { width:140px; height:3px; background:rgba(255,255,255,0.05); position:relative; overflow:hidden; }
  .shimmer-fill { width:80%; height:100%; background:linear-gradient(to right,#00f0ff,#ff0099); }
  .shimmer-bar::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent); animation:shimmer 2s ease-in-out infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }
</style>
</head>
<body>
  <div class="item">
    <div class="glitch" data-text="GLITCH">GLITCH</div>
    <div class="meta">Text Glitch (3s loop)</div>
  </div>
  <div class="item">
    <div class="flicker">TBN</div>
    <div class="meta">Neon Flicker (9s loop)</div>
  </div>
  <div class="item">
    <div class="reveal">Scroll Reveal</div>
    <div class="meta">FadeInUp (0.8s)</div>
  </div>
  <div class="item" style="align-items:center;">
    <div class="scroll-line"></div>
    <div class="meta">Scroll Indicator</div>
  </div>
  <div class="item">
    <div class="shimmer-bar"><div class="shimmer-fill"></div></div>
    <div class="meta">Skill Bar Shimmer</div>
  </div>
</body>
</html>
