<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; cursor:none; }
  html { scroll-behavior:smooth; }
  body { background:#03030f; color:#c8d6e5; font-family:'Space Mono',monospace; overflow-x:hidden; }

  :root {
    --bg:#03030f; --bg2:#060614; --cyan:#00f0ff; --pink:#ff0099;
    --purple:#7700ff; --text:#c8d6e5; --text-dim:#5a6a7a;
  }

  /* Grid bg */
  .grid-bg {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(0,240,255,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,240,255,0.04) 1px,transparent 1px);
    background-size:60px 60px;
    animation:gridPulse 6s ease-in-out infinite;
  }
  @keyframes gridPulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  .scanlines {
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
    animation:scanMove 10s linear infinite;
  }
  @keyframes scanMove { 0%{background-position:0 0} 100%{background-position:0 100px} }

  /* Cursor */
  .cursor {
    width:10px; height:10px; background:var(--cyan); border-radius:50%;
    position:fixed; pointer-events:none; z-index:9999; transform:translate(-50%,-50%);
    box-shadow:0 0 15px var(--cyan),0 0 30px var(--cyan),0 0 60px rgba(0,240,255,0.3);
    mix-blend-mode:screen; transition:transform 0.1s, background 0.2s;
  }
  .cursor-ring {
    width:36px; height:36px; border:1.5px solid var(--cyan); border-radius:50%;
    position:fixed; pointer-events:none; z-index:9998; opacity:0.7;
    transform:translate(-50%,-50%);
    transition:width 0.3s,height 0.3s,border-color 0.3s;
  }

  #app { position:relative; z-index:2; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scanlines"></div>
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="cur-ring"></div>

<!-- Splash screen -->

  position:fixed;inset:0;z-index:10000;
  background:#03030f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 0.9s ease, transform 0.9s ease;
">
  <!-- Grid + scanlines inside splash -->
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(0,240,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.04) 1px,transparent 1px);background-size:60px 60px;opacity:0.6;pointer-events:none;"></div>

function SectionLabel({ num, title }) {
  return (
    <div style={{textAlign:'center',marginBottom:'4rem'}}>
      <span style={{
        fontSize:'0.65rem',letterSpacing:'0.4em',color:C.cyan,
        textTransform:'uppercase',display:'block',marginBottom:'1rem',
        fontFamily:"'Space Mono',monospace"
      }}>{num}</span>
      <h2 style={{
        fontFamily:"'Orbitron',monospace",fontSize:'clamp(1.4rem,4vw,2.2rem)',
        fontWeight:700,color:'#fff',letterSpacing:'0.05em',display:'inline-block'
      }}>{title}</h2>
      <div style={{width:60,height:2,background:'linear-gradient(to right,#00f0ff,#ff0099)',margin:'1.5rem auto 0',position:'relative'}}>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
          width:6,height:6,background:C.cyan,borderRadius:'50%',
          boxShadow:'0 0 10px #00f0ff',animation:'dotPulse 2s ease-in-out infinite'}} />
      </div>
      <style>{`@keyframes dotPulse{0%,100%{box-shadow:0 0 10px #00f0ff}50%{box-shadow:0 0 20px #00f0ff,0 0 40px rgba(0,240,255,0.5)}}`}</style>
    </div>
  );
}

/* ── Tag ─────────────────────────────────── */
function Tag({ children }) {
  const [hov,setHov] = React.useState(false);
  return (
    <span
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        padding:'0.25rem 0.75rem',
        border:`1px solid ${hov?C.cyan:'rgba(0,240,255,0.2)'}`,
        fontSize:'0.62rem',letterSpacing:'0.1em',color:C.cyan,textTransform:'uppercase',
        transition:'all 0.3s',
        background: hov?'rgba(0,240,255,0.1)':'transparent',
        boxShadow: hov?'0 0 10px rgba(0,240,255,0.2)':'none',
        fontFamily:"'Space Mono',monospace"
      }}>
      {children}
    </span>
  );
}

/* ── ServiceCard ─────────────────────────── */
function ServiceCard({ num, icon, title, desc, tags, delay=0 }) {
  const [hov,setHov] = React.useState(false);
  const [tilt,setTilt] = React.useState({x:0,y:0});
  const [shine,setShine] = React.useState({x:50,y:50});
  const ref = React.useRef();

  function onMove(e) {
    const r = ref.current.getBoundingClientRect();
    const x = (e.clientX - r.left)/r.width - 0.5;
    const y = (e.clientY - r.top)/r.height - 0.5;
    setTilt({x,y});
    setShine({x:(e.clientX-r.left)/r.width*100, y:(e.clientY-r.top)/r.height*100});
  }

  return (
    <div ref={ref}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>{setHov(false);setTilt({x:0,y:0});}}
      onMouseMove={onMove}
      style={{
        padding:'2.5rem',position:'relative',overflow:'hidden',
        background:'rgba(6,6,20,0.7)',
        border:`2px solid ${hov?'transparent':'rgba(0,240,255,0.15)'}`,
        backdropFilter:'blur(10px)',
        transform: hov
          ? `perspective(700px) rotateY(${tilt.x*20}deg) rotateX(${-tilt.y*20}deg) translateY(-10px) scale(1.03)`
          : 'none',
        transition: hov ? 'transform 0.08s ease,box-shadow 0.3s' : 'transform 0.55s cubic-bezier(0.175,0.885,0.32,1.275),box-shadow 0.3s',
        boxShadow: hov ? '0 20px 60px rgba(0,240,255,0.15),0 0 40px rgba(0,240,255,0.08)' : 'none',
        animationDelay:`${delay}s`
      }}>
      {/* Conic border */}
      {hov && <div style={{
        position:'absolute',inset:-2,pointerEvents:'none',zIndex:0,
        border:'2px solid transparent',
        background:'linear-gradient(rgba(6,6,20,0),rgba(6,6,20,0)) padding-box, conic-gradient(from 0deg,#00f0ff,#ff0099,#7700ff,#00f0ff) border-box',
        animation:'borderSpin 3s linear infinite'
      }} />}
      {/* Shine */}
      {hov && <div style={{
        position:'absolute',inset:0,pointerEvents:'none',zIndex:1,
        background:`radial-gradient(circle at ${shine.x}% ${shine.y}%,rgba(0,240,255,0.1) 0%,transparent 60%)`
      }} />}
      <span style={{position:'absolute',top:'1.5rem',right:'1.5rem',fontFamily:"'Orbitron',monospace",fontSize:'0.7rem',color:'rgba(0,240,255,0.15)',zIndex:2}}>{num}</span>
      <span style={{fontSize:'2.5rem',marginBottom:'1.5rem',display:'block',color:C.cyan,
        textShadow:'0 0 20px #00f0ff,0 0 40px rgba(0,240,255,0.4)',
        animation:'iconPulse 3s ease-in-out infinite',position:'relative',zIndex:2}}>{icon}</span>
      <h3 style={{fontFamily:"'Orbitron',monospace",fontSize:'1rem',fontWeight:700,color:'#fff',
        marginBottom:'1rem',letterSpacing:'0.05em',position:'relative',zIndex:2}}>{title}</h3>
      <p style={{fontSize:'0.78rem',lineHeight:1.9,color:C.dim,position:'relative',zIndex:2}}>{desc}</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:'0.5rem',marginTop:'1.5rem',position:'relative',zIndex:2}}>
        {tags.map(t=><Tag key={t}>{t}</Tag>)}
      </div>
      <style>{`
        @keyframes borderSpin{to{--ba:360deg}}
        @keyframes iconPulse{0%,100%{text-shadow:0 0 20px #00f0ff,0 0 40px rgba(0,240,255,0.4)}50%{text-shadow:0 0 35px #00f0ff,0 0 70px rgba(0,240,255,0.6)}}
      `}</style>
    </div>
  );
}

/* ── WorkItem ────────────────────────────── */
function WorkItem({ label, title, category, genre, link, bgStyle, idx }) {
  const [hov,setHov] = React.useState(false);
  const [tilt,setTilt] = React.useState({x:0,y:0});
  const ref = React.useRef();
  function onMove(e){
    const r=ref.current.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5;
    const y=(e.clientY-r.top)/r.height-0.5;
    setTilt({x,y});
  }
  const Wrap = link ? 'a' : 'div';
  return (
    <Wrap ref={ref} href={link||undefined} target={link?"_blank":undefined}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>{setHov(false);setTilt({x:0,y:0});}}
      onMouseMove={onMove}
      style={{
        position:'relative',aspectRatio:'16/9',
        background:'rgba(6,6,20,0.8)',
        border:'1px solid rgba(0,240,255,0.08)',
        overflow:'hidden',display:'block',textDecoration:'none',
        transform: hov
          ? `perspective(900px) rotateY(${tilt.x*12}deg) rotateX(${-tilt.y*12}deg) translateY(-6px) scale(1.02)`
          : 'none',
        transition: hov ? 'transform 0.08s ease,box-shadow 0.3s' : 'transform 0.55s cubic-bezier(0.175,0.885,0.32,1.275),box-shadow 0.3s',
        boxShadow: hov ? '0 0 60px rgba(0,240,255,0.12),0 20px 40px rgba(0,0,0,0.5)' : 'none',
      }}>
      {/* BG */}
      <div style={{position:'absolute',inset:0,transition:'transform 0.6s ease',transform:hov?'scale(1.08)':'scale(1)',...bgStyle}} />
      {/* Placeholder — index number + genre badge */}
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'0.75rem'}}>
        <span style={{fontFamily:"'Orbitron',monospace",fontSize:'1.4rem',fontWeight:900,color:'rgba(0,240,255,0.08)',letterSpacing:'0.1em'}}>{label}</span>
        <span style={{
          padding:'0.3rem 1rem',border:'1px solid rgba(0,240,255,0.12)',
          fontSize:'0.65rem',color:'rgba(0,240,255,0.35)',letterSpacing:'0.2em',
          textTransform:'uppercase',fontFamily:"'Space Mono',monospace"
        }}>{genre}</span>
      </div>
      {/* Overlay on hover */}
      <div style={{
        position:'absolute',inset:0,
        background:'linear-gradient(135deg,rgba(0,240,255,0.07),rgba(255,0,153,0.04))',
        border:`1px solid ${C.cyan}`,
        display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'2rem',
        opacity: hov ? 1 : 0, transition:'opacity 0.35s ease',
        backdropFilter:'blur(8px)'
      }}>
        <span style={{fontSize:'0.62rem',letterSpacing:'0.3em',color:C.cyan,textTransform:'uppercase',marginBottom:'0.5rem',fontFamily:"'Space Mono',monospace"}}>{category}</span>
        <h3 style={{fontFamily:"'Orbitron',monospace",fontSize:'1rem',fontWeight:700,color:'#fff',textShadow:'0 0 20px rgba(255,255,255,0.5)'}}>{title}</h3>
      </div>
    </Wrap>
  );
}

/* ── HeroSection ─────────────────────────── */
function HeroSection({ onNav }) {
  const phrases = [
    'HP制作 / Bot開発 / AIエージェント開発',
    'Turning Ideas into Digital Reality',
    '最先端技術でビジョンを実現する',
  ];
  const [text,setText] = React.useState('');

  const [ci,setCi] = React.useState(0);
  const [del,setDel] = React.useState(false);

  React.useEffect(() => {
    const cur = phrases[pi];
    const next = del ? cur.substring(0,ci-1) : cur.substring(0,ci+1);
    setText(next);
    let d = del ? 30 : 70;
    if (!del && ci === cur.length) d = 2200;
    if (del && ci === 0) { setDel(false); setPi(p=>(p+1)%phrases.length); return; }

      del ? setCi(c=>c-1) : setCi(c=>c+1);

    return () => clearTimeout(t);

/* ── Buttons ─────────────────────────────── */
function BtnPrimary({ children, onClick }) {
  const [hov,setHov] = React.useState(false);
  return (
    <button onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}
      style={{
        padding:'0.85rem 2.2rem',background: hov?C.cyan:'transparent',
        border:`1px solid ${C.cyan}`,color: hov?C.bg:C.cyan,
        fontFamily:"'Space Mono',monospace",fontSize:'0.72rem',letterSpacing:'0.2em',
        textTransform:'uppercase',cursor:'pointer',transition:'all 0.3s',
        boxShadow: hov?`0 0 30px ${C.cyan},0 0 60px rgba(0,240,255,0.3)`:'none'
      }}>
      {children}
    </button>
  );
}
function BtnSecondary({ children, onClick }) {
  const [hov,setHov] = React.useState(false);
  return (
    <button onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}
      style={{
        padding:'0.85rem 2.2rem',background:'transparent',
        border:`1px solid ${hov?C.pink:C.dim}`,color: hov?C.pink:C.dim,
        fontFamily:"'Space Mono',monospace",fontSize:'0.72rem',letterSpacing:'0.2em',
        textTransform:'uppercase',cursor:'pointer',transition:'all 0.3s',
        boxShadow: hov?'0 0 30px rgba(255,0,153,0.3)':'none'
      }}>
      {children}
    </button>
  );
}

/* ── App ─────────────────────────────────── */
function App() {
  const [section,setSection] = React.useState('hero');

  function scrollToSection(id) {
    setSection(id);
    if (id === 'hero') { window.scrollTo({top:0,behavior:'smooth'}); return; }
    const el = document.getElementById(id);
    if (el) el.scrollTop && el.scrollIntoView ? window.scrollTo({top:el.offsetTop-80,behavior:'smooth'}) : null;
    if (el) window.scrollTo({top:el.offsetTop-80,behavior:'smooth'});
  }

  // Cursor
  React.useEffect(() => {
    const cur = document.getElementById('cur');
    const ring = document.getElementById('cur-ring');
    let rx=0,ry=0;
    const move = e => {
      cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px';
    };
    document.addEventListener('mousemove', move);
    let af;
    let tx=0,ty=0;
    const animRing = () => {
      const curRect = cur.getBoundingClientRect();
      const cx = curRect.left + curRect.width/2;
      const cy = curRect.top + curRect.height/2;
      rx += (cx - rx) * 0.12; ry += (cy - ry) * 0.12;
      ring.style.left = rx+'px'; ring.style.top = ry+'px';
      af = requestAnimationFrame(animRing);
    };
    animRing();
    const over = () => { cur.style.background='#ff0099'; cur.style.boxShadow='0 0 15px #ff0099,0 0 30px #ff0099'; ring.style.width='58px';ring.style.height='58px';ring.style.borderColor='rgba(255,0,153,0.8)'; };
    const out = () => { cur.style.background='#00f0ff'; cur.style.boxShadow='0 0 15px #00f0ff,0 0 30px #00f0ff'; ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(0,240,255,0.7)'; };
    document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',over);el.addEventListener('mouseleave',out);});
    return () => { document.removeEventListener('mousemove',move); cancelAnimationFrame(af); };
  }, []);

  return (
    <>
      <PlasmaBlobs />
      <Nav section={section} onNav={scrollToSection} />
      <HeroSection onNav={scrollToSection} />
      <ServicesSection />
      <WorksSection />
      <AboutSection />
      <ContactSection />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);

// ── Splash Screen Logic ───────────────────
(function initSplash() {
  const splash = document.getElementById('splash');
  const logoWrap = document.getElementById('splash-logo');
  const bar = document.getElementById('splash-bar');

  // Fade in logo
  requestAnimationFrame(() => {
    logoWrap.style.opacity = '1';
    logoWrap.style.transform = 'scale(1)';
  });

  // Start progress bar after short delay
  setTimeout(() => {
    bar.style.width = '220px';
  }, 300);

  // Dismiss splash after 3.2s
  setTimeout(() => {
    splash.style.opacity = '0';
    splash.style.transform = 'scale(1.04)';
    splash.style.pointerEvents = 'none';
    setTimeout(() => {
      splash.style.display = 'none';
    }, 950);
  }, 3200);
})();
</script>
